name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run regression suite
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Run-Tests.ps1
